name: Mirror Entire Portfolio Site

on:
  schedule:
    - cron: '0 */12 * * *' # Runs automatically every 12 hours
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  mirror-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer and PDF tools
        run: npm install puppeteer pdfjs-dist@3.4.120

      - name: Write mirror script
        run: |
          cat > mirror.js << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const path = require('path');

          // ── YOUR PAGES ARRAY ──
          const PAGES = [
            'port_kirui.php',
            'liv.php',
            'valmanu.php'
          ];

          (async () => {
            if (!fs.existsSync('uploads')) fs.mkdirSync('uploads');
            fs.copyFileSync(path.join(__dirname, 'node_modules', 'pdfjs-dist', 'build', 'pdf.worker.min.js'), 'pdf.worker.min.js');

            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 800 });
            const userAgent = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36';
            await page.setUserAgent(userAgent);
            await page.setExtraHTTPHeaders({
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8',
              'Accept-Language': 'en-GB,en;q=0.9',
              'Cache-Control': 'no-cache',
            });

            // Loop through every page in the array
            for (const pageName of PAGES) {
              console.log('\n========================================');
              console.log('Processing: ' + pageName);

              const targetUrl = 'https://creativepulse.42web.io/cps/' + pageName;

              try {
                await page.goto(targetUrl, { waitUntil: 'networkidle2', timeout: 60000 });
                await page.evaluate(() => document.fonts.ready);
                await new Promise(r => setTimeout(r, 4000));

                // 1. Inline CSS and Fonts
                await page.evaluate(async () => {
                  const links = Array.from(document.querySelectorAll('link[rel="stylesheet"]'));
                  for (const link of links) {
                    try {
                      const resp = await fetch(link.href, { mode: 'cors' });
                      if (!resp.ok) continue;
                      let css = await resp.text();
                      const fontUrls = [...css.matchAll(/url\(['"]?(https?:\/\/[^'")]+\.woff2[^'"]*)['"]?\)/g)].map(m => m[1]);
                      for (const fontUrl of fontUrls) {
                        try {
                          const fr = await fetch(fontUrl);
                          const buf = await fr.arrayBuffer();
                          const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
                          css = css.replace(fontUrl, 'data:font/woff2;base64,' + b64);
                        } catch(fe) {}
                      }
                      const style = document.createElement('style');
                      style.textContent = css;
                      link.parentNode.replaceChild(style, link);
                    } catch(e) {}
                  }
                });

                // 2. Fix external assets (Images) to point to 42web.io
                await page.evaluate(() => {
                  const base = 'https://creativepulse.42web.io/cps/';
                  document.querySelectorAll('[src],[action]').forEach(el => {
                    ['src','action'].forEach(attr => {
                      const val = el.getAttribute(attr);
                      if (val && !val.startsWith('http') && !val.startsWith('//') && !val.startsWith('data:')) {
                        el.setAttribute(attr, base + val);
                      }
                    });
                  });
                  
                  // Fix inline backgrounds
                  document.querySelectorAll('[style]').forEach(el => {
                    const bg = el.style.backgroundImage;
                    if (bg && bg.includes('url(') && !bg.includes('http') && !bg.includes('data:')) {
                       el.style.backgroundImage = bg.replace(/url\(['"]?([^'"]+)['"]?\)/, 'url("' + base + '$1")');
                    }
                  });
                });

                // 3. Rewrite internal navigation links (.php to .html)
                await page.evaluate(() => {
                  document.querySelectorAll('a[href]').forEach(a => {
                    let href = a.getAttribute('href');
                    if (href && !href.startsWith('http') && href.includes('.php')) {
                      a.setAttribute('href', href.replace('.php', '.html'));
                    }
                  });
                });

                // 4. Download PDFs using session cookies
                const cookies = await page.cookies();
                const cookieStr = cookies.map(c => c.name + '=' + c.value).join('; ');

                const pdfUrls = await page.evaluate(() => {
                  const seen = new Set();
                  document.querySelectorAll('[data-pdf]').forEach(el => {
                    if(el.getAttribute('data-pdf')) seen.add(el.getAttribute('data-pdf'));
                  });
                  document.querySelectorAll('[onclick]').forEach(el => {
                    const attr = el.getAttribute('onclick');
                    if (attr && attr.includes('openPdfModal')) {
                      const m = attr.match(/openPdfModal\(['"]([^'"]+)['"]/);
                      if (m) seen.add(m[1]);
                    }
                  });
                  return Array.from(seen);
                });

                if (pdfUrls.length > 0) console.log('Downloading PDFs...');
                for (const src of pdfUrls) {
                  const absUrl = src.startsWith('http') ? src : 'https://creativepulse.42web.io/cps/' + src;
                  const filename = decodeURIComponent(absUrl.split('/').pop());
                  const localPath = 'uploads/' + filename;
                  try {
                    const res = await fetch(absUrl, { headers: { 'Cookie': cookieStr, 'User-Agent': userAgent } });
                    if (res.ok) {
                      const buf = Buffer.from(await res.arrayBuffer());
                      if (!buf.subarray(0, 15).toString().toLowerCase().includes('<html')) {
                        fs.writeFileSync(localPath, buf);
                      }
                    }
                  } catch(err) {}
                }

                // 5. Patch HTML layout to reference local PDFs
                await page.evaluate(() => {
                  document.querySelectorAll('[data-pdf]').forEach(el => {
                    const src = el.getAttribute('data-pdf');
                    if (src && src.includes('.pdf')) {
                      const filename = decodeURIComponent(src.split('/').pop().split('?')[0]);
                      el.setAttribute('data-pdf', 'uploads/' + filename);
                    }
                  });
                  document.querySelectorAll('[onclick]').forEach(el => {
                    const attr = el.getAttribute('onclick');
                    if (attr && attr.includes('openPdfModal')) {
                      el.setAttribute('onclick', attr.replace(/openPdfModal\(['"]([^'"]+)['"]/, function(match, p1) {
                        const filename = decodeURIComponent(p1.split('/').pop().split('?')[0]);
                        return 'openPdfModal("uploads/' + filename + '")';
                      }));
                    }
                  });
                  document.querySelectorAll('a[href]').forEach(el => {
                    const href = el.getAttribute('href');
                    if (href && href.includes('.pdf')) {
                      const filename = decodeURIComponent(href.split('/').pop().split('?')[0]);
                      el.setAttribute('href', 'uploads/' + filename);
                    }
                  });
                });

                let html = await page.content();

                // 6. Global PDF Worker & AdSense configurations
                html = html.replace(/pdfjsLib\.GlobalWorkerOptions\.workerSrc\s*=\s*['"][^'"]+['"];?/, "pdfjsLib.GlobalWorkerOptions.workerSrc='pdf.worker.min.js';");
                html = html.replace('</body>', '<script>if(typeof pdfjsLib !== "undefined") pdfjsLib.GlobalWorkerOptions.workerSrc="pdf.worker.min.js";</script>\n</body>');
                const adsTag = '<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9638774372490271" crossorigin="anonymous"></script>';
                html = html.replace('</head>', adsTag + '\n</head>');

                // 7. Save file and map main page to index.html
                let outName = pageName.replace('.php', '.html');
                if (pageName === 'port_kirui.php') {
                    outName = 'index.html'; 
                }

                fs.writeFileSync(outName, html);
                console.log('Saved as ' + outName + ' (' + html.length + ' bytes)');

              } catch (error) {
                console.error('Failed to process ' + pageName + ':', error.message);
              }
            }

            await browser.close();
            console.log('\nAll pages processed successfully!');
          })().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Run mirror script
        run: node mirror.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage specific output components explicitly
          git add index.html
          git add *.html
          git add pdf.worker.min.js
          if [ -d "uploads" ]; then git add uploads/; fi
          
          # Safe commit and direct deployment push to remote tracking branch
          git diff --cached --quiet || git commit -m "Full site mirror update $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
