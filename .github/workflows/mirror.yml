name: Mirror Entire Portfolio Site

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  mirror-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Write and Run Mirror Script
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const path = require('path');

          const PAGES = ['port_kirui.php', 'liv.php', 'valmanu.php'];

          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            
            for (const pageName of PAGES) {
              const page = await browser.newPage();
              const outName = (pageName === 'port_kirui.php') ? 'index.html' : pageName.replace('.php', '.html');
              
              console.log('Navigating to ' + pageName);
              await page.goto('https://creativepulse.42web.io/cps/' + pageName, { waitUntil: 'networkidle2' });
              
              const html = await page.content();
              
              // Write and FORCE sync to disk
              const fd = fs.openSync(outName, 'w');
              fs.writeSync(fd, html);
              fs.fsyncSync(fd);
              fs.closeSync(fd);
              
              console.log('Successfully wrote: ' + outName);
              await page.close();
            }
            await browser.close();
          })();"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only add the files if they exist
          if [ -f "index.html" ]; then git add index.html; fi
          if [ -f "liv.html" ]; then git add liv.html; fi
          if [ -f "valmanu.html" ]; then git add valmanu.html; fi
          
          git commit -m \"Mirror update $(date)\" || echo \"No changes to commit\"
          git push origin main
