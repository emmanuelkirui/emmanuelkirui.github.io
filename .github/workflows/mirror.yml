name: Mirror Portfolio with Retry Logic

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  mirror-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install puppeteer

      - name: Process Pages
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          const PAGES = ['port_kirui.php', 'liv.php', 'valmanu.php'];
          const BASE_URL = 'https://creativepulse.42web.io/cps/';
          let failed = [];

          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            
            async function processPage(pageName) {
              const page = await browser.newPage();
              const outName = (pageName === 'port_kirui.php') ? 'index.html' : pageName.replace('.php', '.html');
              
              await page.goto(BASE_URL + pageName, { waitUntil: 'networkidle2', timeout: 30000 });
              
              // Fix assets without breaking already absolute paths
              await page.evaluate((base) => {
                document.querySelectorAll('img, link, script').forEach(el => {
                  const attr = el.tagName === 'IMG' ? 'src' : 'href';
                  const val = el.getAttribute(attr);
                  if (val && !val.startsWith('http') && !val.startsWith('data:') && !val.startsWith('/')) {
                    el.setAttribute(attr, base + val);
                  }
                });
              }, BASE_URL);

              const html = await page.content();
              fs.writeFileSync(outName, html);
              console.log('SUCCESS: ' + outName);
              await page.close();
            }

            for (const pageName of PAGES) {
              try {
                await processPage(pageName);
              } catch (e) {
                console.log('FAILED: ' + pageName);
                failed.push(pageName);
              }
            }
            
            if (failed.length > 0) {
              console.log('Retrying failed pages...');
              for (const pageName of failed) {
                try {
                   await processPage(pageName);
                   console.log('RETRY SUCCESS: ' + pageName);
                } catch(e) {
                   console.log('CRITICAL FAIL: ' + pageName);
                }
              }
            }
            await browser.close();
          })();"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html
          git diff --cached --quiet || git commit -m "Mirror update $(date)"
          git push origin main
